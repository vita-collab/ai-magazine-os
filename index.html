<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Magazine OS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-0:#08080d;--bg-1:#0e0e16;--bg-2:#14141e;--bg-3:#1a1a28;--bg-4:#222234;
  --border:#262640;--border-h:#363656;
  --t1:#ededf4;--t2:#a0a0b8;--t3:#606078;
  --blue:#4c8dff;--purple:#8b5cf6;--green:#34d399;--orange:#fb923c;
  --red:#f87171;--cyan:#22d3ee;--pink:#f472b6;--yellow:#fbbf24;
  --font-d:'Playfair Display',Georgia,serif;
  --font-b:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-m:'JetBrains Mono',monospace;
  --r:14px;--r-s:10px;
}
html{scroll-behavior:smooth}
body{background:var(--bg-0);color:var(--t1);font-family:var(--font-b);line-height:1.6}
::selection{background:var(--purple);color:#fff}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg-0)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===== LOADING ===== */
.loading-screen{position:fixed;inset:0;z-index:9999;background:var(--bg-0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s,visibility .5s}
.loading-screen.hidden{opacity:0;visibility:hidden}
.loading-dot-group{display:flex;gap:8px}
.loading-dot{width:10px;height:10px;border-radius:50%;background:var(--purple);animation:ldot 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.15s;background:var(--blue)}
.loading-dot:nth-child(3){animation-delay:.3s;background:var(--cyan)}
@keyframes ldot{0%,80%,100%{transform:scale(.4);opacity:.3}40%{transform:scale(1);opacity:1}}
.loading-text{font-family:var(--font-m);font-size:.8rem;color:var(--t3);letter-spacing:.1em}

/* ===== HEADER ===== */
.hdr{position:sticky;top:0;z-index:100;background:rgba(8,8,13,.88);backdrop-filter:blur(24px) saturate(1.6);border-bottom:1px solid var(--border);padding:0 28px}
.hdr-in{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--font-d);font-size:1.5rem;font-weight:700;letter-spacing:-.03em}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--blue),var(--purple),var(--pink));border-radius:8px;display:grid;place-items:center;font-size:14px;color:#fff;font-weight:700}
.hdr-meta{text-align:right}
.hdr-date{font-family:var(--font-m);font-size:.68rem;color:var(--t3);letter-spacing:.05em}
.hdr-status{font-size:.65rem;color:var(--green);display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:2px}
.hdr-status .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== NAV ===== */
.nav{display:flex;gap:2px;background:var(--bg-1);border-radius:var(--r-s);padding:3px}
.nav-btn{padding:5px 13px;border-radius:7px;font-size:.75rem;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:none;transition:all .2s;white-space:nowrap;font-family:var(--font-b)}
.nav-btn:hover{color:var(--t2);background:var(--bg-2)}
.nav-btn.on{color:var(--t1);background:var(--bg-3);box-shadow:0 1px 6px rgba(0,0,0,.3)}

/* ===== MAIN ===== */
.main{max-width:1440px;margin:0 auto;padding:20px 28px 80px}

/* ===== TREND RADAR ===== */
.radar{background:linear-gradient(135deg,rgba(76,141,255,.06),rgba(139,92,246,.06),rgba(244,114,182,.04));border:1px solid rgba(76,141,255,.12);border-radius:var(--r);padding:22px 26px;margin-bottom:28px;position:relative;overflow:hidden}
.radar::after{content:'';position:absolute;top:-60%;right:-15%;width:320px;height:320px;background:radial-gradient(circle,rgba(139,92,246,.05) 0%,transparent 70%);pointer-events:none}
.radar-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.radar-title{font-family:var(--font-d);font-size:1.2rem}
.radar-badge{font-size:.6rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(76,141,255,.12);color:var(--blue)}
.radar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.radar-item{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r-s);padding:14px;transition:all .2s}
.radar-item:hover{border-color:var(--border-h);background:rgba(255,255,255,.04)}
.radar-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.radar-label.real{color:var(--green)}
.radar-label.hype{color:var(--orange)}
.radar-label.watch{color:var(--cyan)}
.radar-item strong{font-size:.85rem;display:block;margin-bottom:4px}
.radar-item p{font-size:.78rem;color:var(--t2);line-height:1.45}

/* ===== FILTER ===== */
.filter-bar{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.fbtn{padding:5px 14px;border-radius:20px;font-size:.72rem;font-weight:500;border:1px solid var(--border);background:none;color:var(--t3);cursor:pointer;transition:all .2s;font-family:var(--font-b)}
.fbtn:hover{border-color:var(--border-h);color:var(--t2)}
.fbtn.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ===== SECTION ===== */
.sec{margin-bottom:40px}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-title{font-family:var(--font-d);font-size:1.4rem;letter-spacing:-.02em}
.sec-sub{font-family:var(--font-m);font-size:.65rem;color:var(--t3)}

/* ===== CARD GRID ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}

/* ===== CARD ===== */
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;display:flex;flex-direction:column;transition:all .25s;position:relative}
.card:hover{border-color:var(--border-h);background:var(--bg-3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.35)}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tag{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:4px}
.tag-model{background:rgba(76,141,255,.1);color:var(--blue)}
.tag-product{background:rgba(139,92,246,.1);color:var(--purple)}
.tag-repo{background:rgba(52,211,153,.1);color:var(--green)}
.tag-discussion{background:rgba(251,146,60,.1);color:var(--orange)}
.tag-tool{background:rgba(34,211,238,.1);color:var(--cyan)}
.tag-insight{background:rgba(244,114,182,.1);color:var(--pink)}
.card-score{font-family:var(--font-m);font-size:.68rem;color:var(--t3)}
.card-score b{color:var(--green)}
.card-title{font-family:var(--font-d);font-size:1.1rem;line-height:1.3;margin-bottom:7px}
.subtags{display:flex;flex-wrap:wrap;gap:6px;margin:-2px 0 10px}
.subtag{font-size:.62rem;padding:3px 8px;border-radius:999px;border:1px solid var(--border);color:var(--t2);background:rgba(255,255,255,.03)}
.card-summary{font-size:.82rem;color:var(--t2);margin-bottom:12px;flex:1}
.card-meta{margin-bottom:10px;padding:10px 12px;background:rgba(255,255,255,.015);border-radius:var(--r-s);border:1px solid rgba(255,255,255,.03)}
.card-meta-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.card-meta-label.why{color:var(--orange)}
.card-meta-label.angle{color:var(--cyan)}
.card-meta-text{font-size:.78rem;color:var(--t2);line-height:1.4}
.card-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:.7rem;font-weight:500;border:1px solid var(--border);background:none;color:var(--t2);cursor:pointer;transition:all .2s;text-decoration:none;font-family:var(--font-b)}
.btn:hover{border-color:var(--border-h);color:var(--t1);background:var(--bg-4)}
.btn-expand{margin-left:auto;border-color:var(--purple);color:var(--purple)}
.btn-expand:hover{background:rgba(139,92,246,.1)}

/* ===== EXPAND ===== */
.exp{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s ease,margin .3s ease}
.exp.open{max-height:700px;padding-top:12px;margin-top:12px;border-top:1px solid var(--border)}
.exp-sec{margin-bottom:10px}
.exp-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--purple);margin-bottom:3px}
.exp-text{font-size:.78rem;color:var(--t2);line-height:1.45}
.exp-links{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.exp-link{font-size:.68rem;padding:3px 10px;border-radius:6px;background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.18);color:var(--purple);text-decoration:none;transition:all .2s}
.exp-link:hover{background:rgba(139,92,246,.14)}

/* ===== INSIGHT BLOCK ===== */
.insight{background:linear-gradient(135deg,rgba(244,114,182,.04),rgba(139,92,246,.04));border:1px solid rgba(244,114,182,.12);border-radius:var(--r);padding:24px 26px;margin-bottom:40px}
.insight-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
.insight-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r-s);padding:16px}
.insight-card h4{font-family:var(--font-d);font-size:.95rem;margin-bottom:6px}
.insight-card p{font-size:.78rem;color:var(--t2);line-height:1.45}
.insight-card ul{list-style:none;padding:0;margin-top:6px}
.insight-card li{font-size:.76rem;color:var(--t2);padding:3px 0 3px 16px;position:relative}
.insight-card li::before{content:'→';position:absolute;left:0;color:var(--pink)}

/* ===== ERROR ===== */
.error-banner{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:var(--r-s);padding:14px 18px;margin-bottom:20px;font-size:.82rem;color:var(--red);display:none}
.error-banner.show{display:block}

/* ===== FOOTER ===== */
.footer{text-align:center;padding:28px;border-top:1px solid var(--border);color:var(--t3);font-size:.7rem}
.footer a{color:var(--blue);text-decoration:none}
.footer code{font-family:var(--font-m);background:var(--bg-2);padding:2px 6px;border-radius:4px;font-size:.65rem}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .hdr{padding:0 14px}
  .main{padding:14px}
  .grid{grid-template-columns:1fr}
  .radar-grid{grid-template-columns:1fr}
  .insight-grid{grid-template-columns:1fr}
  .nav{display:none}
}

/* ===== ANIM ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .4s ease both}
</style>
</head>
<body>

<div class="loading-screen" id="loader">
  <div class="loading-dot-group"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
  <div class="loading-text">LOADING DATA.JSON …</div>
</div>

<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="logo-mark">M</div>
      <span>AI Magazine OS</span>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="hdr-meta">
      <div class="hdr-date" id="hdrDate"></div>
      <div class="hdr-status"><span class="dot"></span> <span id="hdrStatus">Loading…</span></div>
    </div>
  </div>
</header>

<main class="main">
  <div class="error-banner" id="errorBanner"></div>
  <div id="app"></div>
</main>

<footer class="footer">
  AI Magazine OS v2.0 · Data-driven · <code>python3 update.py</code> 每日更新 · 
  <a href="data.json" target="_blank">data.json</a> · 
  上次更新：<span id="lastUpdate">—</span>
</footer>

<script>
// ===================================================================
// AI Magazine OS — Frontend (reads data.json)
// ===================================================================

const DATA_URL = 'data.json';
let DATA = null;
let activeSection = 'all';
let activeFilter = 'all';

// ---- Helpers ----
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];
const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html) e.innerHTML = html; return e; };

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function nowDate() {
  return new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
}

// ---- Data Loading ----
async function loadData() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
    return true;
  } catch (e) {
    console.error('Failed to load data.json:', e);
    showError(`无法加载 data.json — ${e.message}。请先运行 <code>python3 update.py</code> 生成数据。`);
    return false;
  }
}

function showError(msg) {
  const banner = $('#errorBanner');
  banner.innerHTML = msg;
  banner.classList.add('show');
}

// ---- Rendering ----
function buildTag(tag) {
  const first = Array.isArray(tag) ? tag[0] : tag;
  return `<span class="tag tag-${first}">${first}</span>`;
}

function buildCard(item, isCover = false) {
  const scores = item.scores || {};
  const total = scores.total || (scores.knowledge_value + scores.marketing_value + scores.forkability + scores.engageability) || 0;
  const tags = item.tags || ['model'];
  const primaryTag = tags[0] || 'model';
  const eid = 'exp-' + item.id;

  const subTags = [
    ...(item.geo_tags || []),
    ...(item.entity_tags || []),
    ...(item.topic_tags || [])
  ].slice(0, 6);

  const subTagsHTML = subTags.length
    ? `<div class="subtags">${subTags.map(t => `<span class="subtag">${t}</span>`).join('')}</div>`
    : '';

  let metaHTML = '';
  if (item.why_it_matters) {
    metaHTML += `<div class="card-meta"><div class="card-meta-label why">⭐ 为什么值得看</div><div class="card-meta-text">${item.why_it_matters}</div></div>`;
  }
  if (item.content_angle) {
    metaHTML += `<div class="card-meta"><div class="card-meta-label angle">💡 内容角度</div><div class="card-meta-text">${item.content_angle}</div></div>`;
  }

  let btns = '';
  if (item.read_url) btns += `<a class="btn" href="${item.read_url}" target="_blank" rel="noopener">🔗 Read</a>`;
  if (item.try_url) btns += `<a class="btn" href="${item.try_url}" target="_blank" rel="noopener">🧪 Try</a>`;
  if (item.fork_url) btns += `<a class="btn" href="${item.fork_url}" target="_blank" rel="noopener">🧬 Fork</a>`;
  if (item.engage_url) btns += `<a class="btn" href="${item.engage_url}" target="_blank" rel="noopener">💬 Engage</a>`;
  if (isCover) btns += `<button class="btn btn-expand" data-eid="${eid}">▼ 展开</button>`;

  let expandHTML = '';
  if (isCover) {
    expandHTML = `<div class="exp" id="${eid}">`;
    expandHTML += `<div class="exp-sec"><div class="exp-label">⚡ 一句话理解</div><div class="exp-text">${item.summary || ''}</div></div>`;
    expandHTML += `<div class="exp-sec"><div class="exp-label">🎯 可直接用的角度</div><div class="exp-text">${item.content_angle || ''}</div></div>`;
    expandHTML += `<div class="exp-sec"><div class="exp-label">📊 评分</div><div class="exp-text">知识价值: ${scores.knowledge_value || 0} · 营销价值: ${scores.marketing_value || 0} · 可 Fork: ${scores.forkability || 0} · 可参与: ${scores.engageability || 0}</div></div>`;
    const links = [];
    if (item.read_url) links.push(`<a class="exp-link" href="${item.read_url}" target="_blank">🔗 原文</a>`);
    if (item.try_url) links.push(`<a class="exp-link" href="${item.try_url}" target="_blank">🧪 试玩</a>`);
    if (item.fork_url) links.push(`<a class="exp-link" href="${item.fork_url}" target="_blank">🧬 Fork</a>`);
    if (item.engage_url) links.push(`<a class="exp-link" href="${item.engage_url}" target="_blank">💬 讨论</a>`);
    if (links.length) expandHTML += `<div class="exp-links">${links.join('')}</div>`;
    expandHTML += `</div>`;
  }

  return `
    <div class="card anim" data-tag="${primaryTag}" style="animation-delay:${Math.random() * 0.2}s">
      <div class="card-top">${buildTag(primaryTag)}<span class="card-score"><b>${total}</b>/40</span></div>
      <h3 class="card-title">${item.title}</h3>
      ${subTagsHTML}
      <p class="card-summary">${item.summary}</p>
      ${metaHTML}
      <div class="card-actions">${btns}</div>
      ${expandHTML}
    </div>`;
}

function buildSection(id, icon, title, subtitle, items, isCover = false) {
  if (!items || items.length === 0) return '';
  const gridClass = isCover ? 'grid' : 'grid';
  return `
    <section class="sec" id="section-${id}">
      <div class="sec-head">
        <h2 class="sec-title">${icon} ${title}</h2>
        <span class="sec-sub">${subtitle}</span>
      </div>
      <div class="${gridClass}">${items.map(i => buildCard(i, isCover)).join('')}</div>
    </section>`;
}

function buildRadar(trends) {
  if (!trends || trends.length === 0) return '';
  return `
    <section class="radar" id="section-radar">
      <div class="radar-head">
        <span class="radar-title">🧠 Trend Radar</span>
        <span class="radar-badge" style="animation:pulse 2s infinite">LIVE · 近 3 天趋势</span>
      </div>
      <div class="radar-grid">
        ${trends.map(t => `
          <div class="radar-item">
            <div class="radar-label ${t.label}">${t.labelText}</div>
            <strong>${t.title}</strong>
            <p>${t.text}</p>
          </div>`).join('')}
      </div>
    </section>`;
}

function buildInsights(insights) {
  if (!insights || insights.length === 0) return '';
  return `
    <section class="insight" id="section-marketing">
      <div class="sec-head" style="border-color:rgba(244,114,182,.15)">
        <h2 class="sec-title">💡 For Marketing / Insight</h2>
        <span class="sec-sub">你的内容弹药库</span>
      </div>
      <div class="insight-grid">
        ${insights.map(ins => `
          <div class="insight-card">
            <h4>${ins.title}</h4>
            <p>${ins.text}</p>
            <ul>${(ins.items || []).map(i => `<li>${i}</li>`).join('')}</ul>
          </div>`).join('')}
      </div>
    </section>`;
}

function buildFilterBar() {
  const filters = ['all', 'model', 'product', 'repo', 'tool', 'discussion'];
  return `<div class="filter-bar" id="filterBar">${filters.map(f =>
    `<button class="fbtn${f === activeFilter ? ' on' : ''}" data-f="${f}">${f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)}</button>`
  ).join('')}</div>`;
}

function render() {
  if (!DATA) return;
  const app = $('#app');
  const sections = DATA.sections || {};

  let html = '';
  html += buildRadar(DATA.trends);
  html += buildFilterBar();
  html += buildSection('cover', '📰', '今日封面', `${(DATA.cover || []).length} 条精选 · Score ≥ 24`, DATA.cover, true);
  html += buildSection('models', '🔬', 'Models & Research', 'Hugging Face · Papers with Code', sections.models);
  html += buildSection('products', '🚀', 'Products & Demos', 'HF Spaces · 新产品', sections.products);
  html += buildSection('opensource', '🧬', 'Open Source / GitHub', 'GitHub Trending', sections.opensource);
  html += buildSection('tools', '🛠', 'Tools / Agents / Workflow', 'Agent · Automation', sections.tools);
  html += buildSection('discussions', '💬', 'Discussions / Opinions', 'Reddit · X', sections.discussions);
  html += buildInsights(DATA.insights);

  app.innerHTML = html;

  // Bind expand buttons
  $$('.btn-expand').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel = $('#' + btn.dataset.eid);
      if (!panel) return;
      const isOpen = panel.classList.toggle('open');
      btn.textContent = isOpen ? '▲ 收起' : '▼ 展开';
    });
  });

  // Bind filter buttons
  $$('.fbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.f;
      $$('.fbtn').forEach(b => b.classList.toggle('on', b.dataset.f === activeFilter));
      applyFilter();
    });
  });

  applyFilter();
  applyNav();
}

function applyFilter() {
  $$('.card').forEach(card => {
    const tag = card.dataset.tag;
    card.style.display = (activeFilter === 'all' || tag === activeFilter) ? '' : 'none';
  });
}

function applyNav() {
  const sectionMap = {
    all: null,
    cover: 'section-cover',
    models: 'section-models',
    products: 'section-products',
    opensource: 'section-opensource',
    tools: 'section-tools',
    discussions: 'section-discussions',
    marketing: 'section-marketing',
    radar: 'section-radar',
  };
  const allIds = Object.values(sectionMap).filter(Boolean);

  if (activeSection === 'all') {
    allIds.forEach(id => { const el = $('#' + id); if (el) el.style.display = ''; });
    const fb = $('#filterBar'); if (fb) fb.style.display = '';
  } else {
    allIds.forEach(id => { const el = $('#' + id); if (el) el.style.display = 'none'; });
    const target = sectionMap[activeSection];
    if (target) { const el = $('#' + target); if (el) el.style.display = ''; }
    // Always show radar with cover
    if (activeSection === 'cover') { const r = $('#section-radar'); if (r) r.style.display = ''; }
    const fb = $('#filterBar'); if (fb) fb.style.display = activeSection === 'all' ? '' : 'none';
  }
}

function buildNav() {
  const tabs = [
    ['all', '全部'], ['cover', '封面'], ['models', 'Models'], ['products', 'Products'],
    ['opensource', 'Open Source'], ['tools', 'Tools'], ['discussions', 'Discussions'], ['marketing', 'Marketing']
  ];
  const nav = $('#nav');
  nav.innerHTML = tabs.map(([k, v]) =>
    `<button class="nav-btn${k === activeSection ? ' on' : ''}" data-sec="${k}">${v}</button>`
  ).join('');
  $$('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSection = btn.dataset.sec;
      $$('.nav-btn').forEach(b => b.classList.toggle('on', b.dataset.sec === activeSection));
      applyNav();
    });
  });
}

// ---- Init ----
async function init() {
  $('#hdrDate').textContent = nowDate();
  buildNav();

  const ok = await loadData();
  $('#loader').classList.add('hidden');

  if (ok && DATA) {
    render();
    const updated = DATA.meta?.updated_at;
    $('#hdrStatus').textContent = `${DATA.meta?.total_items || 0} items · ${(DATA.meta?.sources_scraped || []).length} sources`;
    $('#lastUpdate').textContent = formatDate(updated);
  } else {
    $('#hdrStatus').textContent = 'No data';
    $('#hdrStatus').style.color = 'var(--red)';
  }
}

init();
</script>
</body>
</html>
